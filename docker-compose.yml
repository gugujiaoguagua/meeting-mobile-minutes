name: ${COMPOSE_PROJECT_NAME:-meeting-loop-test}

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  db:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-meeting-loop-test-db}
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_loop}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_loop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_loop_change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-meeting-loop-test-app}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      MEETING_STATE_STORE: ${MEETING_STATE_STORE:-json}
      DATABASE_URL: ${DATABASE_URL:-postgres://meeting_loop:meeting_loop_change_me@db:5432/meeting_loop}
      POSTGRES_URL: ${POSTGRES_URL:-}
      NEXT_PUBLIC_ENABLE_DEEPSEEK_DRAFT: ${NEXT_PUBLIC_ENABLE_DEEPSEEK_DRAFT:-0}
      DEEPSEEK_API_MODE: ${MEETING_DEEPSEEK_API_MODE:-auto}
      DEEPSEEK_API_KEY: ${MEETING_DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_KEY_FILE: ${MEETING_DEEPSEEK_API_KEY_FILE:-}
      DEEPSEEK_BASE_URL: ${MEETING_DEEPSEEK_BASE_URL:-}
      DEEPSEEK_OPENAI_URL: ${MEETING_DEEPSEEK_OPENAI_URL:-}
      DEEPSEEK_OPENAI_MODEL: ${MEETING_DEEPSEEK_OPENAI_MODEL:-}
      DEEPSEEK_TIMEOUT_MS: ${MEETING_DEEPSEEK_TIMEOUT_MS:-}
      DEEPSEEK_PROXY_URL: ${MEETING_DEEPSEEK_PROXY_URL:-}
      MEETING_PUBLIC_BASE_URL: ${MEETING_PUBLIC_BASE_URL:-http://localhost:3000}
      MEETING_BACKEND_BASE_URL: ${MEETING_BACKEND_BASE_URL:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_ACCESS_TOKEN: ${WECOM_ACCESS_TOKEN:-}
      WECOM_TOKEN_FILE: ${WECOM_TOKEN_FILE:-}
      WECOM_TOKEN_API_URL: ${WECOM_TOKEN_API_URL:-}
      WECOM_API_BASE_URL: ${WECOM_API_BASE_URL:-}
      WECOM_SYNC_ROOT_DEPARTMENT_ID: ${WECOM_SYNC_ROOT_DEPARTMENT_ID:-}
      WECOM_PRESIDENT_USERID: ${WECOM_PRESIDENT_USERID:-}
      WECOM_PRESIDENT_USERIDS: ${WECOM_PRESIDENT_USERIDS:-}
      WECOM_USERID_FROM_EMP_ID: ${WECOM_USERID_FROM_EMP_ID:-}
      WECOM_USER_MAP_JSON: ${WECOM_USER_MAP_JSON:-}
      WECOM_USER_MAP_FILE: ${WECOM_USER_MAP_FILE:-}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_DEEPLINK_SECRET: ${WECOM_DEEPLINK_SECRET:-}
      WECOM_OAUTH_STATE_SECRET: ${WECOM_OAUTH_STATE_SECRET:-}
      WECOM_CALLBACK_TOKEN: ${WECOM_CALLBACK_TOKEN:-}
      WECOM_CALLBACK_ENCODING_AES_KEY: ${WECOM_CALLBACK_ENCODING_AES_KEY:-}
      WECOM_CALLBACK_RECEIVE_ID: ${WECOM_CALLBACK_RECEIVE_ID:-}
      TENCENTCLOUD_APPID: ${TENCENTCLOUD_APPID:-}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID:-}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY:-}
      TENCENTCLOUD_REGION: ${TENCENTCLOUD_REGION:-ap-guangzhou}
      TENCENT_ASR_ENGINE_MODEL_TYPE: ${TENCENT_ASR_ENGINE_MODEL_TYPE:-16k_zh}
      TENCENT_ASR_RES_TEXT_FORMAT: ${TENCENT_ASR_RES_TEXT_FORMAT:-3}
      TENCENT_ASR_CHANNEL_NUM: ${TENCENT_ASR_CHANNEL_NUM:-1}
      TENCENT_ASR_POLL_TIMEOUT_MS: ${TENCENT_ASR_POLL_TIMEOUT_MS:-45000}
      TENCENT_ASR_POLL_INTERVAL_MS: ${TENCENT_ASR_POLL_INTERVAL_MS:-2000}
      TENCENT_ASR_NORMALIZE_AUDIO: ${TENCENT_ASR_NORMALIZE_AUDIO:-1}
      TENCENT_ASR_AUDIO_FILTER: ${TENCENT_ASR_AUDIO_FILTER:-dynaudnorm=f=150:g=25,volume=12dB,alimiter=limit=0.95}
      TENCENT_REALTIME_ASR_ENGINE_MODEL_TYPE: ${TENCENT_REALTIME_ASR_ENGINE_MODEL_TYPE:-16k_zh}
      TENCENT_REALTIME_ASR_VOICE_FORMAT: ${TENCENT_REALTIME_ASR_VOICE_FORMAT:-1}
      TENCENT_REALTIME_ASR_NEED_VAD: ${TENCENT_REALTIME_ASR_NEED_VAD:-1}
      TENCENT_REALTIME_ASR_FILTER_EMPTY_RESULT: ${TENCENT_REALTIME_ASR_FILTER_EMPTY_RESULT:-1}
      TENCENT_REALTIME_ASR_MAX_SPEAK_TIME: ${TENCENT_REALTIME_ASR_MAX_SPEAK_TIME:-10000}
      TENCENT_REALTIME_ASR_SIGNATURE_TTL_SECONDS: ${TENCENT_REALTIME_ASR_SIGNATURE_TTL_SECONDS:-300}
      MEETING_OBJECT_STORAGE: ${MEETING_OBJECT_STORAGE:-}
      MEETING_OSS_REGION: ${MEETING_OSS_REGION:-}
      MEETING_OSS_ENDPOINT: ${MEETING_OSS_ENDPOINT:-}
      MEETING_OSS_BUCKET: ${MEETING_OSS_BUCKET:-}
      MEETING_OSS_PREFIX: ${MEETING_OSS_PREFIX:-}
      MEETING_OSS_ACCESS_KEY_ID: ${MEETING_OSS_ACCESS_KEY_ID:-}
      MEETING_OSS_ACCESS_KEY_SECRET: ${MEETING_OSS_ACCESS_KEY_SECRET:-}
      MEETING_OSS_SIGNED_URL_TTL_SECONDS: ${MEETING_OSS_SIGNED_URL_TTL_SECONDS:-7200}
      MEETING_OSS_REQUEST_TIMEOUT_MS: ${MEETING_OSS_REQUEST_TIMEOUT_MS:-300000}
      MEETING_OSS_MULTIPART_THRESHOLD_BYTES: ${MEETING_OSS_MULTIPART_THRESHOLD_BYTES:-20971520}
      MEETING_OSS_MULTIPART_PART_SIZE_BYTES: ${MEETING_OSS_MULTIPART_PART_SIZE_BYTES:-8388608}
    ports:
      - "${WEB_HTTP_PORT:-127.0.0.1:13000}:3000"
    volumes:
      - ./.local-data:/app/.local-data

volumes:
  postgres-data:
